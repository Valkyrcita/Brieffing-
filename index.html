<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Branding - Uñas, Pestañas y Cejas</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6a0dad 0%, #4a148c 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
            line-height: 1.5;
        }

        .container {
            max-width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8e24aa 0%, #6a1b9a 100%);
            color: white;
            padding: 30px 25px;
            text-align: center;
        }

        .header h1 {
            font-size: clamp(1.4em, 5vw, 2em);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .header p {
            opacity: 0.95;
            font-size: clamp(0.9em, 4vw, 1.1em);
        }

        .form-section {
            padding: 25px;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .section-title {
            color: #6a1b9a;
            font-size: clamp(1.1em, 4.5vw, 1.3em);
            margin-bottom: 18px;
            font-weight: 600;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 16px;
        }

        input[type="text"], input[type="email"], input[type="tel"], textarea, select {
            width: 100%;
            padding: 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s ease;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8e24aa;
            box-shadow: 0 0 0 3px rgba(142, 36, 170, 0.1);
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 18px;
            padding-right: 45px;
        }

        .checkbox-group, .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .checkbox-item, .radio-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 16px;
            padding: 8px 0;
        }

        .checkbox-item input[type="checkbox"], 
        .radio-item input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        button {
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8e24aa 0%, #6a1b9a 100%);
            color: white;
            font-size: 17px;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #ab47bc 0%, #7b1fa2 100%);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            color: #6a1b9a;
            border: 2px solid #8e24aa;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #8e24aa;
            color: white;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .results {
            display: none;
            padding: 25px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .results.show {
            display: block;
        }

        .result-item {
            margin-bottom: 22px;
            padding: 20px;
            background: linear-gradient(135deg, #f9f5ff 0%, #f1e8ff 100%);
            border-radius: 12px;
            border-left: 4px solid #8e24aa;
        }

        .result-title {
            color: #6a1b9a;
            font-size: 1.1em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .result-content {
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
        }

        .result-list {
            padding-left: 20px;
        }

        .success-message {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        .error-message {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        .back-btn {
            margin-bottom: 25px;
        }

        /* Scrollbar personalizada para móvil */
        .results::-webkit-scrollbar {
            width: 4px;
        }

        .results::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .results::-webkit-scrollbar-thumb {
            background: #8e24aa;
            border-radius: 2px;
        }

        @media (min-width: 768px) {
            body {
                padding: 25px;
            }
            
            .buttons {
                flex-direction: row;
                justify-content: center;
            }
            
            button {
                width: auto;
                min-width: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Cuestionario Branding</h1>
            <p>Uñas, Pestañas y Cejas</p>
        </div>

        <div id="formContainer">
            <form id="questionnaireForm">
                <!-- Sección 1: Datos personales -->
                <div class="form-section">
                    <div class="section">
                        <div class="section-title">📋 Datos Personales</div>
                        <div>
                            <label for="nombre">Nombre completo *</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="email">Correo electrónico *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="telefono">Teléfono (opcional)</label>
                            <input type="tel" id="telefono" name="telefono">
                        </div>
                    </div>

                    <!-- Sección 2: Negocio -->
                    <div class="section">
                        <div class="section-title">💅 Tu Negocio</div>
                        <div>
                            <label for="nombreNegocio">Nombre de tu negocio *</label>
                            <input type="text" id="nombreNegocio" name="nombreNegocio" required>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="añosExperiencia">¿Cuántos años llevas en el negocio?</label>
                            <select id="añosExperiencia" name="añosExperiencia">
                                <option value="">Selecciona...</option>
                                <option value="menos1">Menos de 1 año</option>
                                <option value="1-3">1-3 años</option>
                                <option value="3-5">3-5 años</option>
                                <option value="5+">Más de 5 años</option>
                            </select>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="servicios">¿Qué servicios ofreces? (selecciona todos los que apliquen)</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="uñas" name="servicios" value="Uñas">
                                    <label for="uñas">Uñas (acrílico, gel, esmalte semipermanente, etc.)</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="pestañas" name="servicios" value="Pestañas">
                                    <label for="pestañas">Pestañas (extensiones, lifting, etc.)</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="cejas" name="servicios" value="Cejas">
                                    <label for="cejas">Cejas (microblading, laminado, tinte, etc.)</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="otros" name="servicios" value="Otros">
                                    <label for="otros">Otros servicios</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sección 3: Público objetivo -->
                    <div class="section">
                        <div class="section-title">👥 Público Objetivo</div>
                        <div>
                            <label>Edad principal de tus clientas:</label>
                            <div class="radio-group">
                                <div class="radio-item">
                                    <input type="radio" id="edad18-25" name="edad" value="18-25">
                                    <label for="edad18-25">18-25 años</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="edad25-35" name="edad" value="25-35">
                                    <label for="edad25-35">25-35 años</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="edad35-45" name="edad" value="35-45">
                                    <label for="edad35-45">35-45 años</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="edad45+" name="edad" value="45+">
                                    <label for="edad45+">45+ años</label>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="clientasIdeal">Describe a tu clienta ideal (hábitos, gustos, estilo de vida):</label>
                            <textarea id="clientasIdeal" name="clientasIdeal" rows="3"></textarea>
                        </div>
                    </div>

                    <!-- Sección 4: Competencia y diferenciación -->
                    <div class="section">
                        <div class="section-title">⭐ Diferenciación</div>
                        <div>
                            <label for="diferenciador">¿Qué te hace única/o frente a la competencia?</label>
                            <textarea id="diferenciador" name="diferenciador" rows="3"></textarea>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="competencia">¿Quiénes son tus principales competidores?</label>
                            <input type="text" id="competencia" name="competencia">
                        </div>
                    </div>

                    <!-- Sección 5: Estilo y preferencias -->
                    <div class="section">
                        <div class="section-title">🎨 Estilo Visual</div>
                        <div>
                            <label>Estilo que prefieres para tu marca:</label>
                            <div class="radio-group">
                                <div class="radio-item">
                                    <input type="radio" id="elegante" name="estilo" value="Elegante">
                                    <label for="elegante">✨ Elegante y sofisticado</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="moderno" name="estilo" value="Moderno">
                                    <label for="moderno">⚡ Moderno y minimalista</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="divertido" name="estilo" value="Divertido">
                                    <label for="divertido">🌈 Divertido y colorido</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="boho" name="estilo" value="Boho">
                                    <label for="boho">🌿 Boho/natural</label>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 20px;">
                            <label for="coloresFavoritos">Colores que te gustan para tu marca (ej: rosas, dorados, negros):</label>
                            <input type="text" id="coloresFavoritos" name="coloresFavoritos">
                        </div>
                    </div>

                    <div class="buttons">
                        <button type="button" class="btn-secondary" onclick="showResults()">Ver Resultados</button>
                        <button type="submit" class="btn-primary" id="submitBtn">✨ Enviar a mi correo</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Resultados -->
        <div id="resultsContainer" class="results">
            <button class="btn-secondary back-btn" onclick="showForm()">← Volver al formulario</button>
            <div id="resultsContent"></div>
        </div>
    </div>

    <!-- Mensajes de estado -->
    <div id="successMessage" class="success-message">
        ✅ ¡Gracias! Tu cuestionario ha sido enviado exitosamente a <strong>laritsacamoa@gmail.com</strong>. Recibirás los resultados en breve.
    </div>
    <div id="errorMessage" class="error-message">
        ❌ Error al enviar. Por favor, intenta de nuevo.
    </div>

    <script>
        // Configuración de EmailJS - REEMPLAZA CON TUS CLAVES REALES
        // 1. Ve a https://www.emailjs.com/ y crea una cuenta gratis
        // 2. Crea un servicio email y obtén tu SERVICE_ID
        // 3. Crea una plantilla email y obtén tu TEMPLATE_ID
        // 4. Obtén tu PUBLIC_KEY

        const SERVICE_ID = 'YOUR_SERVICE_ID'; // Reemplaza
        const TEMPLATE_ID = 'YOUR_TEMPLATE_ID'; // Reemplaza  
        const PUBLIC_KEY = 'YOUR_PUBLIC_KEY'; // Reemplaza

        emailjs.init(PUBLIC_KEY);

        function showResults() {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('resultsContainer').classList.add('show');
            
            // Aquí puedes agregar lógica para mostrar resultados del cuestionario
            document.getElementById('resultsContent').innerHTML = `
                <div class="result-item">
                    <div class="result-title">📋 Resumen de tus respuestas</div>
                    <div class="result-content">
                        Haz clic en "Enviar a mi correo" para recibir todo el análisis completo en tu bandeja de entrada.
                    </div>
                </div>
            `;
        }

        function showForm() {
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('resultsContainer').classList.remove('show');
        }

        document.getElementById('questionnaireForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Enviando... ⏳';

            // Recopilar todos los datos del formulario
            const formData = new FormData(this);
            const data = {};
            
            // Proces
